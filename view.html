<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>عرض الملف</title>
  <style>
    html, body { height: 100%; margin: 0; }
    iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <iframe id="frame" title="PDF Viewer"></iframe>

  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get("file");

    // حماية بسيطة: فقط pdf في نفس المجلد
    if (!file || !file.toLowerCase().endsWith(".pdf") || file.includes("/") || file.includes("..")) {
      document.body.innerHTML = "<p style='font-family:sans-serif;padding:16px'>ملف غير صالح.</p>";
    } else {
      const pdfUrl = `${location.origin}${location.pathname.replace(/\/[^\/]*$/, "/")}${encodeURIComponent(file)}`;
      const gview = "https://docs.google.com/gview?embedded=1&url=" + encodeURIComponent(pdfUrl);
      document.getElementById("frame").src = gview;
      document.title = file;
    }
  </script>
</body>
</html>
